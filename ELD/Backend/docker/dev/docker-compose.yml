version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: eld-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: eld
      POSTGRES_USER: eld
      POSTGRES_PASSWORD: eldpassword

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: eld-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: